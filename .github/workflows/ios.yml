name: iOS CI

env:
  IOS_SIMULATOR_NAME: "iPhone 16 Pro"

on: [push, pull_request]

jobs:
  info:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check environment info
        run: |
          echo "Xcode version:"
          xcodebuild -version
          echo ""
          echo "Swift version:"
          swift --version
      
      - name: Check iPhone 16 Pro simulator
        run: |
          echo "Looking for $IOS_SIMULATOR_NAME simulator:"
          xcrun simctl list devices available | grep -F "$IOS_SIMULATOR_NAME"
      
      - name: List project schemes
        run: |
          cd MagicTokens
          echo "Available schemes:"
          xcodebuild -list -project "MagicTokens.xcodeproj"
  
  build:
    runs-on: macos-15
    needs: info
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: |
          cd MagicTokens
          echo "🔍 Running SwiftLint..."
          swiftlint --strict

      - name: Build app
        run: |
          cd MagicTokens
          echo "🔨 Building app..."
          set -o pipefail
          if xcodebuild clean build \
            -skipPackagePluginValidation \
            -project "MagicTokens.xcodeproj" \
            -scheme "MagicTokens" \
            -destination "platform=iOS Simulator,name=$IOS_SIMULATOR_NAME" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO; then
            echo "✅ Build succeeded!"
          else
            echo "❌ Build failed!"
            exit 1
          fi

  test:
    runs-on: macos-15
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run tests with detailed logs
        id: tests
        run: |
          cd MagicTokens
          echo "🧪 Running tests..."
          
          mkdir -p test-logs
          
          set -o pipefail
          set +e
          xcodebuild test \
            -project "MagicTokens.xcodeproj" \
            -scheme "MagicTokens" \
            -destination "platform=iOS Simulator,name=$IOS_SIMULATOR_NAME" \
            -configuration Debug \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO > test-logs/full-log.txt 2>&1
          XCODE_EXIT_CODE=$?
          cat test-logs/full-log.txt
          set -e
          
          echo "🔴 FAILED TESTS:" > test-logs/failures.txt
          if grep -q "Failing tests:" test-logs/full-log.txt; then
            grep -A10 "Failing tests:" test-logs/full-log.txt >> test-logs/failures.txt
            echo "tests_failed=true" >> $GITHUB_ENV
          elif [ "$XCODE_EXIT_CODE" -ne 0 ]; then
            echo "xcodebuild exited with code $XCODE_EXIT_CODE. Last 100 lines of output:" >> test-logs/failures.txt
            tail -100 test-logs/full-log.txt >> test-logs/failures.txt
            echo "tests_failed=true" >> $GITHUB_ENV
          else
            echo "No tests failed ✓" >> test-logs/failures.txt
            echo "tests_failed=false" >> $GITHUB_ENV
          fi
          
          cat test-logs/failures.txt
      
      - name: Upload complete logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complete-test-logs
          path: MagicTokens/test-logs/
      
      - name: Upload Xcode test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-test-results
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/

      - name: Set test job result
        if: always()
        run: |
          if [ "${{ env.tests_failed }}" = "true" ]; then
            exit 1
          fi
