name: iOS CI

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - name: Baixar código
      uses: actions/checkout@v4

    - name: Instalar SwiftLint
      run: brew install swiftlint

    - name: Ver informações do ambiente
      run: |
        echo "Versão do Xcode:"
        xcodebuild -version
        echo ""
        echo "Versão do Swift:"
        swift --version
    
    - name: Listar simuladores disponíveis
      run: |
        echo "Simuladores disponíveis:"
        xcrun simctl list devices available | grep -E "iPhone|iPad"
    
    - name: Listar arquivos do projeto
      run: |
        echo "Arquivos no repositório:"
        ls -la
        echo ""
        echo "Procurando arquivo .xcodeproj:"
        find . -name "*.xcodeproj" -type d
      
    - name: Entrar na pasta e compilar
      run: |
        echo "📁 Entrando na pasta MagicTokens..."
        cd MagicTokens
        
        echo "📁 Arquivos na pasta:"
        ls -la
        
        echo "🔍 Rodando SwiftLint..."
        swiftlint --strict
        
        echo "🔨 Compilando app..."
        xcodebuild clean build \
          -skipPackagePluginValidation \
          -project "MagicTokens.xcodeproj" \
          -scheme "MagicTokens" \
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
          -configuration Debug \
          CODE_SIGNING_ALLOWED=NO